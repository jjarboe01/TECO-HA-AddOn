name: TECO Billing
version: "0.5.3"
slug: teco_billing
description: >-
  Pulls Tampa Electric (TECO) billing, usage, cost and service-period data into
  Home Assistant — feeds the Energy Dashboard (daily kWh + cost), creates sensors,
  and serves a billing dashboard. Logs into account.tecoenergy.com in a headless
  browser (handles reCAPTCHA v3 + Cloudflare) and keeps a persistent, never-purged
  archive of every bill.
url: https://github.com/jjarboe01/TECO-HA-AddOn
arch:
  - amd64
  - aarch64
init: false

# Talk to the HA Core API (push Energy Dashboard statistics + create sensor entities)
homeassistant_api: true

# --- side panel (ingress) -------------------------------------------------- #
ingress: true
ingress_port: 8089
panel_icon: mdi:transmission-tower-export
panel_title: TECO Billing

# --- optional external API port -------------------------------------------- #
# The add-on pushes data into HA itself, so this isn't needed for normal use.
# Exposed only for power users who want to hit /data, /export, etc. directly.
# Protected by auth_token if set (ingress is always exempt). Set to null to disable.
ports:
  8089/tcp: 8089
ports_description:
  8089/tcp: TECO sidecar API (optional; the add-on pushes to HA on its own)

# --- persistent archive ---------------------------------------------------- #
# Add-ons get a persistent /data dir automatically; the bill cache lives in
# /data/cache and is never purged. Back up the add-on to preserve >3yr history.

# --- Configuration tab ----------------------------------------------------- #
options:
  teco_user: ""
  teco_pass: ""
  auth_token: ""
  backfill_bills: 36
  poll_interval_hours: 6
  sensor_refresh_min: 5
  setup_energy_dashboard: true
  session_ttl_min: 30
  log_level: info
schema:
  teco_user: str
  teco_pass: password
  auth_token: password?
  backfill_bills: int(1,120)
  poll_interval_hours: int(1,24)
  sensor_refresh_min: int(1,60)
  setup_energy_dashboard: bool
  session_ttl_min: int(5,240)
  log_level: list(trace|debug|info|warning|error)
