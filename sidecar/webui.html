<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TECO Billing</title>
<style>
  :root { --bg:#0f1620; --card:#16202c; --ink:#e8eef5; --muted:#9fb0c0;
          --accent:#2f8fd6; --accent2:#f0a83a; --line:#26333f; --good:#3ec46d; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
         background:var(--bg); color:var(--ink); }
  header { padding:16px 20px; border-bottom:1px solid var(--line); display:flex;
           align-items:center; gap:14px; flex-wrap:wrap; }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  header .sub { color:var(--muted); font-size:12px; }
  .spacer { flex:1; }
  button, a.btn { background:var(--accent); color:#fff; border:0; border-radius:7px;
          padding:8px 13px; font-size:13px; cursor:pointer; text-decoration:none; }
  button.ghost { background:transparent; border:1px solid var(--line); color:var(--ink); }
  main { padding:20px; max-width:1200px; margin:0 auto; }
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:20px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:14px; }
  .card .k { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
  .card .v { font-size:22px; font-weight:600; margin-top:4px; }
  .card .v small { font-size:12px; color:var(--muted); font-weight:400; }
  section { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; margin-bottom:18px; }
  section h2 { font-size:14px; margin:0 0 12px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.04em; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:right; padding:7px 9px; border-bottom:1px solid var(--line); white-space:nowrap; }
  th:first-child, td:first-child { text-align:left; }
  th { color:var(--muted); font-weight:600; cursor:pointer; user-select:none; }
  tr:hover td { background:rgba(255,255,255,.02); }
  .bars { display:flex; align-items:flex-end; gap:3px; height:120px; }
  .bar { flex:1; background:var(--accent); border-radius:3px 3px 0 0; min-width:2px; position:relative; }
  .bar.cost { background:var(--accent2); }
  .bar.rate { background:var(--good); }
  .bar:hover { filter:brightness(1.3); }
  .axis { display:flex; justify-content:space-between; color:var(--muted); font-size:11px; margin-top:6px; }
  .muted { color:var(--muted); }
  .loading { padding:40px; text-align:center; color:var(--muted); }
  .err { color:#ff6b6b; }
  .row { display:flex; gap:18px; flex-wrap:wrap; } .row > section { flex:1; min-width:300px; }
  #tip { position:fixed; z-index:200; display:none; pointer-events:none; max-width:260px;
         background:#0b1118; border:1px solid var(--line); border-radius:8px; padding:8px 11px;
         font-size:12px; line-height:1.5; color:var(--ink); box-shadow:0 8px 24px rgba(0,0,0,.45); }
  #tip b { color:#fff; }
  #tip .h { font-weight:600; color:#fff; margin-bottom:3px; }
</style>
</head>
<body>
<div id="tip"></div>
<header>
  <h1>⚡ TECO Billing</h1>
  <span class="sub" id="acct"></span>
  <div class="spacer"></div>
  <a class="btn ghost" id="csv" href="export?format=csv">Export CSV</a>
  <button class="ghost" id="reload">Reload archive</button>
  <button id="refresh">Refresh from TECO</button>
</header>
<main>
  <div id="status" class="loading">Loading archive…</div>
  <div id="content" style="display:none">
    <div class="cards" id="cards"></div>
    <div class="row">
      <section><h2>Usage per bill (kWh)</h2><div class="bars" id="kwhBars"></div><div class="axis" id="kwhAxis"></div></section>
      <section><h2>Cost per bill ($)</h2><div class="bars" id="costBars"></div><div class="axis" id="costAxis"></div></section>
    </div>
    <section><h2>$/kWh trend (per bill)</h2><div class="bars" id="rateBars"></div><div class="axis" id="rateAxis"></div></section>
    <section><h2>Daily usage (kWh) — most recent 90 days</h2><div class="bars" id="dailyBars"></div><div class="axis" id="dailyAxis"></div></section>
    <section>
      <h2>All bills <span class="muted" id="billCount"></span></h2>
      <div style="overflow:auto">
      <table id="billsTbl">
        <thead><tr>
          <th data-k="bill_date">Bill date</th>
          <th data-k="service_period_start">Service start</th>
          <th data-k="service_period_end">Service end</th>
          <th data-k="service_days">Days</th>
          <th data-k="kwh_used">kWh</th>
          <th data-k="cost">Cost</th>
          <th data-k="cost_per_kwh">$/kWh</th>
          <th data-k="previous_reading">Prev read</th>
          <th data-k="current_reading">Cur read</th>
          <th>Re-assemble</th>
        </tr></thead>
        <tbody></tbody>
      </table>
      </div>
    </section>
  </div>
</main>
<script>
const $ = s => document.querySelector(s);
const fmtN = (n,d=0) => n==null ? "—" : Number(n).toLocaleString(undefined,{minimumFractionDigits:d,maximumFractionDigits:d});
const money = n => n==null ? "—" : "$"+fmtN(n,2);
// normalize any date (ISO "2026-05-21" or "May 21, 2026") to a consistent YYYY-MM-DD
const fmtDate = s => {
  if(!s) return "—";
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const t = Date.parse(s);
  if(isNaN(t)) return s;
  const d = new Date(t), p = n => String(n).padStart(2,"0");
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
};
let DATA = null, sortKey="service_period_end", sortDir=-1;

async function load(url, label){
  $("#status").style.display="block"; $("#content").style.display="none";
  $("#status").className="loading"; $("#status").textContent = label;
  try{
    const r = await fetch(url);
    if(!r.ok) throw new Error("HTTP "+r.status+" — "+(await r.text()).slice(0,200));
    DATA = await r.json();
    render();
  }catch(e){
    $("#status").className="loading err";
    $("#status").textContent = "Error: "+e.message;
  }
}

const tipEl = $("#tip");
function showTip(html, x, y){
  tipEl.innerHTML = html;
  tipEl.style.display = "block";
  const pad = 14, r = tipEl.getBoundingClientRect();
  let left = x + pad, top = y + pad;
  if (left + r.width > window.innerWidth) left = x - r.width - pad;
  if (top + r.height > window.innerHeight) top = y - r.height - pad;
  tipEl.style.left = left + "px"; tipEl.style.top = top + "px";
}
function hideTip(){ tipEl.style.display = "none"; }

function bars(el, axisEl, items, valFn, labelFn, cls, tipFn, decimals){
  const d = decimals != null ? decimals : (cls==='cost' ? 2 : 0);
  // bars scale between min and max so small-variance series (like $/kWh) are readable
  const all = items.map(it => valFn(it) || 0);
  const max = Math.max(1e-9, ...all);
  const nums = items.map(it=>valFn(it)).filter(v=>v!=null && v>0);  // ignore empty/partial periods
  const min = nums.length ? Math.min(...nums) : 0;
  const avg = nums.length ? nums.reduce((a,b)=>a+b,0)/nums.length : 0;
  const lo = (decimals != null && nums.length) ? min*0.97 : 0;       // zoomed baseline for rate
  const span = Math.max(1e-9, max - lo);
  el._items = items;
  el._tip = tipFn || (it => `<b>${labelFn(it)}</b>: ${fmtN(valFn(it), d)}`);
  el.innerHTML = items.map((it, i) => {
    const v = valFn(it) || 0;
    const h = v > 0 ? Math.max(2, (v - lo) / span * 100) : 0;
    return `<div class="bar ${cls||''}" data-i="${i}" style="height:${h.toFixed(1)}%"></div>`;
  }).join("");
  el.onmousemove = (e) => {
    const b = e.target.closest(".bar");
    if (!b) { hideTip(); return; }
    showTip(el._tip(el._items[+b.dataset.i]), e.clientX, e.clientY);
  };
  el.onmouseleave = hideTip;
  if(items.length){
    axisEl.innerHTML =
      `<span>${labelFn(items[0])}</span>` +
      `<span>min ${fmtN(min,d)} · avg ${fmtN(avg,d)} · max ${fmtN(max,d)}</span>` +
      `<span>${labelFn(items[items.length-1])}</span>`;
  }
}

// rich tooltips
const billTip = b => `<div class="h">${b.label || b.service_period_end || ""}</div>` +
  `Service: ${b.service_period_start || "?"} → ${b.service_period_end || "?"}` +
  (b.service_days != null ? ` (${b.service_days}d)` : "") + `<br>` +
  `Usage: <b>${fmtN(b.kwh_used)} kWh</b><br>` +
  `Cost: <b>${money(b.cost)}</b><br>` +
  `Rate: <b>${b.cost_per_kwh != null ? "$"+fmtN(b.cost_per_kwh,4) : "—"}/kWh</b>`;
const dayTip = d => `<div class="h">${d.date || ""}</div>` +
  `Usage: <b>${fmtN(d.kwh,1)} kWh</b>` +
  (d.temperature != null ? `<br>Temp: ${fmtN(d.temperature)}°F` : "") +
  (d.estimated ? `<br><span class="muted">estimated</span>` : "");
const rateTip = b => `<div class="h">${b.label || b.service_period_end || ""}</div>` +
  `Rate: <b>$${b.cost_per_kwh != null ? fmtN(b.cost_per_kwh,4) : "—"}/kWh</b><br>` +
  `${fmtN(b.kwh_used)} kWh · ${money(b.cost)}`;

function render(){
  const bills = (DATA.bills||[]).slice();
  const daily = (DATA.daily_usage||[]).slice();
  $("#acct").textContent = `${DATA.archived_bills ?? bills.length} bills archived` +
     (DATA.exported_at? ` · exported ${new Date(DATA.exported_at).toLocaleString()}`:"")+
     (DATA.fetched_at? ` · refreshed ${new Date(DATA.fetched_at).toLocaleString()}`:"");

  // KPI cards from the most recent bill + averages
  const byEnd = bills.slice().sort((a,b)=>(a.service_period_end||"").localeCompare(b.service_period_end||""));
  const last = byEnd[byEnd.length-1] || {};
  const totKwh = bills.reduce((s,b)=>s+(b.kwh_used||0),0);
  const totCost = bills.reduce((s,b)=>s+(b.cost||0),0);
  const avgCpk = totKwh? totCost/totKwh : null;
  $("#cards").innerHTML = `
    <div class="card"><div class="k">Latest bill</div><div class="v">${money(last.cost)}</div><div class="muted">${last.label||"—"}</div></div>
    <div class="card"><div class="k">Latest usage</div><div class="v">${fmtN(last.kwh_used)} <small>kWh</small></div><div class="muted">${last.service_period_start||"?"} → ${last.service_period_end||"?"}</div></div>
    <div class="card"><div class="k">Latest $/kWh</div><div class="v">${last.cost_per_kwh!=null?"$"+fmtN(last.cost_per_kwh,4):"—"}</div></div>
    <div class="card"><div class="k">Avg $/kWh (all)</div><div class="v">${avgCpk!=null?"$"+fmtN(avgCpk,4):"—"}</div></div>
    <div class="card"><div class="k">Total archived</div><div class="v">${fmtN(totKwh)} <small>kWh</small></div><div class="muted">${money(totCost)}</div></div>`;

  bars($("#kwhBars"), $("#kwhAxis"), byEnd, b=>b.kwh_used, b=>b.service_period_end||b.label||"", "", billTip);
  bars($("#costBars"), $("#costAxis"), byEnd, b=>b.cost, b=>b.service_period_end||b.label||"", "cost", billTip);
  bars($("#rateBars"), $("#rateAxis"), byEnd, b=>b.cost_per_kwh, b=>b.service_period_end||b.label||"", "rate", rateTip, 4);
  const d90 = daily.slice(-90);
  bars($("#dailyBars"), $("#dailyAxis"), d90, d=>d.kwh, d=>d.date||"", "", dayTip);

  renderTable(bills);
  $("#status").style.display="none"; $("#content").style.display="block";
}

function renderTable(bills){
  bills.sort((a,b)=>{
    const x=a[sortKey], y=b[sortKey];
    if(x==null) return 1; if(y==null) return -1;
    return (x>y?1:x<y?-1:0)*sortDir;
  });
  $("#billCount").textContent = `(${bills.length})`;
  $("#billsTbl tbody").innerHTML = bills.map(b=>`
    <tr>
      <td>${fmtDate(b.bill_date||b.label)}</td>
      <td>${fmtDate(b.service_period_start)}</td>
      <td>${fmtDate(b.service_period_end)}</td>
      <td>${b.service_days??"—"}</td>
      <td>${fmtN(b.kwh_used)}</td>
      <td>${money(b.cost)}</td>
      <td>${b.cost_per_kwh!=null?"$"+fmtN(b.cost_per_kwh,4):"—"}</td>
      <td>${fmtN(b.previous_reading)}</td>
      <td>${fmtN(b.current_reading)}</td>
      <td><button class="ghost re" data-id="${b.invoice_id||""}" style="padding:4px 9px">↻</button></td>
    </tr>`).join("");
  document.querySelectorAll(".re").forEach(btn=>btn.onclick=async()=>{
    const id=btn.dataset.id; if(!id) return;
    btn.textContent="…";
    try{ await fetch("reassemble?invoice_id="+encodeURIComponent(id),{method:"POST"});
         await load("export","Reloading archive…"); }
    catch(e){ btn.textContent="!"; }
  });
}

document.querySelectorAll("#billsTbl th[data-k]").forEach(th=>th.onclick=()=>{
  const k=th.dataset.k; sortDir = (sortKey===k? -sortDir : -1); sortKey=k; renderTable(DATA.bills||[]);
});
$("#reload").onclick=()=>load("export","Reloading archive…");
$("#refresh").onclick=()=>load("data","Refreshing from TECO (first run can take a few minutes)…");
load("export","Loading archive…");
</script>
</body>
</html>
