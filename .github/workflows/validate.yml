name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1"   # weekly, catches upstream rule changes
  workflow_dispatch:

jobs:
  addon:
    name: Add-on lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: "./teco_billing"

  python:
    name: Python compile + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tooling
        run: pip install ruff
      - name: Byte-compile all sources
        run: python -m compileall -q sidecar teco_billing/app
      - name: Ruff (non-blocking style report)
        run: ruff check sidecar || true
